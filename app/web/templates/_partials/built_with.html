<footer class="footer-bar">
  <div class="built-with">
    <span class="built-with-label">Powered by</span>
    <div class="tool-strip">
      {# Hackathon sponsors first #}
      <span class="tool-pill" id="dot-datadog" title="Datadog · every tool call traced">
        <img src="/static/logos/datadog.svg" alt="Datadog">
        <span class="tool-pill-name">Datadog</span>
      </span>
      <span class="tool-pill" id="dot-nimble" title="Nimble · web scraping for official docs">
        <img class="wordmark" src="/static/logos/nimble.svg" alt="Nimble">
      </span>
      <span class="tool-pill" id="dot-senso" title="Senso · publishes citeable answers">
        <img class="wordmark" src="/static/logos/senso.png" alt="Senso">
      </span>

      {# Supporting stack #}
      <span class="tool-pill" id="dot-github" title="GitHub · pulls recent repo issues">
        <img src="/static/logos/github.svg" alt="GitHub">
        <span class="tool-pill-name">GitHub</span>
      </span>
      <span class="tool-pill" id="dot-openai" title="OpenAI · LLM router for clustering &amp; drafts">
        <img src="/static/logos/openai.svg" alt="OpenAI">
        <span class="tool-pill-name">OpenAI</span>
      </span>
      <span class="tool-pill" id="dot-gemini" title="Gemini · model provider">
        <img src="/static/logos/gemini.svg" alt="Gemini">
        <span class="tool-pill-name">Gemini</span>
      </span>
      <span class="tool-pill" id="dot-langchain" title="LangChain · agent orchestration">
        <img src="/static/logos/langchain.svg" alt="LangChain">
        <span class="tool-pill-name">LangChain</span>
      </span>
      <span class="tool-pill" id="dot-clickhouse" title="ClickHouse · audit trail &amp; analytics">
        <img src="/static/logos/clickhouse.svg" alt="ClickHouse">
        <span class="tool-pill-name">ClickHouse</span>
      </span>
      <span class="tool-pill" id="dot-stripe" title="Stripe · optional paid agent workflow">
        <img src="/static/logos/stripe.svg" alt="Stripe">
        <span class="tool-pill-name">Stripe</span>
      </span>
    </div>
    <div id="stats" class="stats">{{ stats_text|default("Awaiting first run.") }}</div>
  </div>
</footer>
